<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdrianShn</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

        body {
            background: url(https://images.unsplash.com/photo-1618771623063-6c3faa854a61?q=80&w=1170) no-repeat center/cover fixed;
            color:white;
        }

        .overlay { min-height:100vh; background:rgba(0,0,0,0.5); display:flex; flex-direction:column; }

        nav {
            display:flex; justify-content:space-between;
            background:#0f172a; padding:15px 40px;
        }

        nav a {
            color:white; margin:0 10px;
            text-decoration:none; cursor:pointer;
        }

        nav a.active { color:gold; }

        .container {
            max-width:800px;
            margin:40px auto;
            background:rgba(15,23,42,0.9);
            padding:30px;
            border-radius:10px;
        }

        .section { display:none; }
        .active { display:block; }

        h1,h2 { text-align:center; color:gold; }

        input, textarea {
            width:100%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:5px;
        }

        button {
            padding:10px;
            background:gold;
            border:none;
            cursor:pointer;
            font-weight:bold;
        }

        ul { list-style:none; }
        li { padding:10px; background:rgba(255,255,255,0.1); margin:5px 0; }

    </style>
</head>

<body>
<div class="overlay">

<!-- NAVBAR -->
<nav>
    <div>
        <a onclick="showMenu('dashboard',this)" class="active">Dashboard</a>
        <a onclick="showMenu('katalog',this)">Katalog</a>
        <a onclick="showMenu('contact',this)">Contact</a>
        <a href="tugas-php.php">Tugas PHP</a>
    </div>
    <div>
        <a onclick="showMenu('login',this)">Login</a>
        <a onclick="showMenu('daftar',this)">Daftar</a>
    </div>
</nav>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
    <h1>AdhyaksaLib</h1>
    <p style="text-align:center;">Perpustakaan Digital Hukum</p>
</div>

<!-- KATALOG -->
<div id="katalog" class="section">
    <h2>Katalog Buku</h2>
    <input type="text" id="search" onkeyup="searchBooks()" placeholder="Cari buku...">

    <ul id="list">
        <li>Hukum Pidana</li>
        <li>Hukum Perdata</li>
        <li>Hukum Agraria</li>
    </ul>
</div>

<!-- LOGIN -->
<div id="login" class="section">
    <h2>Login</h2>

    <form action="tugas-php.php" method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button name="login">LOGIN</button>
    </form>
</div>

<!-- DAFTAR -->
<div id="daftar" class="section">
    <h2>Daftar</h2>

    <form action="tugas-php.php" method="POST">
        <input type="text" name="nama" placeholder="Nama" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button name="daftar">DAFTAR</button>
    </form>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
    <h2>Contact</h2>
    <p style="text-align:center;">Adrian Siahaan</p>
    <p style="text-align:center;">Email: adriansanyakobsiahaan@gmail.com</p>
</div>

</div>

</div>

<script>
function showMenu(id, el){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));
    if(el) el.classList.add('active');
}

function searchBooks(){
    let input=document.getElementById("search").value.toLowerCase();
    let li=document.querySelectorAll("#list li");

    li.forEach(item=>{
        item.style.display = item.innerText.toLowerCase().includes(input) ? "" : "none";
    });
}
</script>

</body>
</html>
